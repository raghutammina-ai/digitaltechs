name: Auto Merge Feature → Test

on:
  push:
    branches:
      - 'feature/**'

jobs:
  merge-to-test:
    name: Merge to test branch
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge feature branch into test
        run: |
          FEATURE_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $FEATURE_BRANCH → test"

          git checkout test

          # Merge, favouring the incoming feature branch on any conflict
          if git merge "origin/$FEATURE_BRANCH" -X theirs --no-edit \
               -m "chore: auto-merge $FEATURE_BRANCH into test [skip ci]"; then
            echo "Merge succeeded."
          else
            echo "Merge failed even with -X theirs. Resetting test to feature branch tip."
            git merge --abort || true
            git reset --hard "origin/$FEATURE_BRANCH"
          fi

          git push origin test
