name: Auto Merge to Test

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-merge:
    name: Auto merge feature branch to test
    runs-on: ubuntu-latest
    # Only run when CI passed and the branch is NOT test or main
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch != 'test' &&
      github.event.workflow_run.head_branch != 'main'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto merge PR into test
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.workflow_run.head_branch;
            console.log(`CI passed on branch: ${branch}`);

            // Find open PRs from this branch targeting test
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'test',
              head: `${context.repo.owner}:${branch}`
            });

            if (prs.length === 0) {
              console.log('No open PR found targeting test branch. Skipping.');
              return;
            }

            for (const pr of prs) {
              console.log(`Merging PR #${pr.number}: ${pr.title}`);
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: `[auto] ${pr.title} (#${pr.number})`
              });
              console.log(`PR #${pr.number} merged into test successfully.`);
            }
