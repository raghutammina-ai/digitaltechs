name: CI

on:
  push:
    branches:
      - test
      - 'feature/**'
      - 'fix/**'
      - 'dev/**'
  pull_request:
    branches:
      - test
      - main

jobs:
  build:
    name: Build & Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build
