name: Auto PR Test → Main

on:
  push:
    branches:
      - test

jobs:
  create-pr:
    name: Create or update PR to main
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update PR from test → main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Check if an open PR already exists
            const { data: existing } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              base:  'main',
              head:  `${owner}:test`,
            });

            if (existing.length > 0) {
              console.log(`PR #${existing[0].number} already open — nothing to do.`);
              return;
            }

            // Get recent commits on test not yet in main for the PR body
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner, repo,
              base: 'main',
              head: 'test',
            });

            const commitLines = comparison.commits
              .slice(-20)               // last 20 commits max
              .reverse()
              .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.slice(0,7)})`)
              .join('\n');

            const body = [
              '## What\'s included',
              '',
              commitLines || '_No new commits found._',
              '',
              '## Checklist',
              '- [ ] CI passing',
              '- [ ] Reviewed changes',
              '- [ ] Ready to deploy',
              '',
              '> Auto-generated by GitHub Actions. Merge when ready to release to production.',
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: '🚀 Release: test → main',
              head:  'test',
              base:  'main',
              body,
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
