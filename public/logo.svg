<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Circuit D icon -->
  <g>
    <!-- Outer D shape -->
    <path d="M8 8 H22 Q42 8 42 30 Q42 52 22 52 H8 Z" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Inner cutout -->
    <path d="M15 16 H21 Q33 16 33 30 Q33 44 21 44 H15 Z" fill="#0f1117"/>
    <!-- Circuit dots -->
    <circle cx="8" cy="8" r="2.5" fill="#22c55e"/>
    <circle cx="8" cy="52" r="2.5" fill="#22c55e"/>
    <circle cx="42" cy="30" r="2.5" fill="#22c55e"/>
    <!-- Circuit lines -->
    <line x1="8" y1="8" x2="2" y2="8" stroke="#22c55e" stroke-width="1.5"/>
    <line x1="2" y1="8" x2="2" y2="15" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="2" cy="15" r="1.5" fill="#22c55e"/>
    <line x1="8" y1="52" x2="2" y2="52" stroke="#22c55e" stroke-width="1.5"/>
    <line x1="2" y1="52" x2="2" y2="45" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="2" cy="45" r="1.5" fill="#22c55e"/>
    <line x1="42" y1="30" x2="48" y2="30" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="48" cy="30" r="1.5" fill="#22c55e"/>
    <!-- Small inner circuit -->
    <circle cx="22" cy="22" r="2" fill="#22c55e" opacity="0.7"/>
    <line x1="22" y1="22" x2="28" y2="22" stroke="#22c55e" stroke-width="1.2" opacity="0.7"/>
    <circle cx="22" cy="38" r="2" fill="#22c55e" opacity="0.7"/>
    <line x1="22" y1="38" x2="28" y2="38" stroke="#22c55e" stroke-width="1.2" opacity="0.7"/>
  </g>

  <!-- DIGITAL TECH text -->
  <text x="58" y="27" font-family="Arial, sans-serif" font-weight="800" font-size="16" fill="white" letter-spacing="2">DIGITAL TECH</text>
  <!-- PROSPERITY text -->
  <text x="58" y="47" font-family="Arial, sans-serif" font-weight="800" font-size="16" fill="#22c55e" letter-spacing="2">PROSPERITY</text>
</svg>
